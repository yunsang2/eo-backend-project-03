<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>33Chat 결제 테스트 (포트원 V1)</title>
    <!-- 🚨 포트원 V1 필수 라이브러리: jQuery 추가 -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <!-- 🚨 포트원 V1 안정화 버전 SDK -->
    <script type="text/javascript" src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; }
        #log { margin-top: 20px; padding: 20px; background: #f0f0f0; text-align: left; white-space: pre-wrap; }
    </style>
</head>
<body>

<h1>🚀 33Chat 플랜 결제 테스트 (V1)</h1>
<p>포트원 식별코드(Store ID)를 입력하고 결제를 진행해보세요.</p>

<input type="text" id="storeId" placeholder="가맹점 식별코드 (예: imp12345678)" style="padding: 10px; width: 300px; margin-bottom: 20px;">
<br>

<button onclick="login()">1. 테스트 계정 로그인</button>
<button onclick="requestPay('PRO', 9900)">2. PRO 플랜 결제 (9,900원)</button>
<button onclick="requestPay('PREMIUM', 19900)">3. PREMIUM 플랜 결제 (19,900원)</button>

<div id="log">로그 대기 중...</div>

<script>
    const axiosInstance = axios.create({
        baseURL: 'http://localhost:8080',
        withCredentials: true // 쿠키(JWT) 자동 전송
    });

    function logMsg(msg) {
        document.getElementById('log').innerText += '\n' + msg;
    }

    // 1. 로그인
    async function login() {
        try {
            const res = await axiosInstance.post('/api/users/login', {
                email: 'test@gmail.com',
                password: 'Password123!'
            });
            logMsg('✅ 로그인 성공! (쿠키에 토큰 저장됨)');
        } catch (e) {
            logMsg('❌ 로그인 실패: ' + e.message);
        }
    }

    // 2. 포트원 결제창 띄우기 (V1 방식)
    function requestPay(planName, amount) {
        const storeId = document.getElementById('storeId').value;
        if(!storeId) {
            alert('가맹점 식별코드를 입력해주세요!'); return;
        }

        // V1 식별코드 초기화
        IMP.init(storeId);

        const merchantUid = 'order_' + new Date().getTime();

        // V1 결제 요청
        IMP.request_pay({
            pg: "kakaopay",
            pay_method: "card",
            merchant_uid: merchantUid,
            name: `33Chat ${planName} 플랜 구독`,
            amount: amount,
            buyer_email: "test@gmail.com",
            buyer_name: "테스터",
        }, async function (rsp) {
            // V1 콜백 핸들링
            if (rsp.success) {
                logMsg(`💳 결제 승인 완료! (imp_uid: ${rsp.imp_uid})`);
                logMsg('⏳ 우리 서버(백엔드)로 검증 요청을 보냅니다...');

                // 백엔드 검증
                try {
                    const verifyRes = await axiosInstance.post('/api/payments/verify', {
                        impUid: rsp.imp_uid,
                        merchantUid: rsp.merchant_uid,
                        planName: planName,
                        amount: amount
                    });
                    logMsg(`🎉 검증 및 업그레이드 완료: ${JSON.stringify(verifyRes.data.data)}`);
                } catch (err) {
                    logMsg(`❌ 서버 검증 실패: ${err.response?.data?.message || err.message}`);
                }
            } else {
                logMsg(`❌ 결제창 취소/에러: ${rsp.error_msg}`);
            }
        });
    }
</script>
</body>
</html>
