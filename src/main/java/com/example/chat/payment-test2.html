<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>33Chat 결제 시스템 V2</title>
    <!-- 포트원 V2 전용 브라우저 SDK -->
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <!-- 통신용 Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f8f9fa; margin: 0; }
        .payment-container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 8px; font-weight: 700; color: #111; }
        p { color: #666; font-size: 14px; margin-bottom: 32px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; outline: none; }
        .btn-login { background-color: #f1f3f5; color: #495057; border: 1px solid #dee2e6; }
        .btn-kakaopay { background-color: #FEE500; color: #3C1E1E; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-kakaopay:disabled { background-color: #eee; color: #aaa; cursor: not-allowed; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #status-log { margin-top: 24px; padding: 16px; background: #222; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 12px; text-align: left; height: 140px; overflow-y: auto; color: #00ff00; }
        .log-item { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>플랜 업그레이드</h2>
    <p>카카오페이로 안전하게 결제하세요.</p>

    <!-- 1. 인증 정보 획득을 위한 로그인 버튼 -->
    <button class="btn btn-login" onclick="login()">1. 테스트 계정 로그인</button>

    <!-- 2. 실결제 진행 버튼 -->
    <button class="btn btn-kakaopay" id="pay-btn" onclick="handlePayment()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.75c0 2.79 1.885 5.234 4.706 6.557l-.872 3.193c-.066.241.223.414.406.257l3.818-3.268c.63.076 1.28.118 1.942.118 5.523 0 10-3.477 10-7.75S17.523 3 12 3z"/></svg>
        카카오페이로 결제하기
    </button>

    <div id="status-log">로그 대기 중...</div>
</div>

<script>
    // Axios 공통 설정 (인증 쿠키 포함)
    const api = axios.create({
        baseURL: 'http://localhost:8080',
        withCredentials: true
    });

    /**
     * 화면 로그 출력 함수
     */
    function addLog(msg) {
        const logContainer = document.getElementById('status-log');
        const now = new Date().toLocaleTimeString();
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span style="color: #888;">[${now}]</span> ${msg}`;
        logContainer.appendChild(item);
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    /**
     * 테스트 유저 로그인 (백엔드 세션/쿠키 생성용)
     */
    async function login() {
        try {
            await api.post('/api/users/login', {
                email: 'test@gmail.com',
                password: 'Password123!'
            });
            addLog("✅ 로그인 성공 (인증 쿠키 획득)");
        } catch (e) {
            addLog("❌ 로그인 실패: " + (e.response?.data?.message || "서버 응답 없음"));
        }
    }

    /**
     * 결제 프로세스 시작
     */
    async function handlePayment() {
        const payBtn = document.getElementById('pay-btn');
        payBtn.disabled = true;

        try {
            addLog("🚀 서버에서 결제 설정을 불러오는 중...");

            // 1. 백엔드로부터 Store ID와 카카오 채널 키 가져오기
            const configRes = await api.get('/api/payments/config');
            const { storeId, channelKey } = configRes.data.data;

            if (!storeId || !channelKey) {
                throw new Error("백엔드에 설정된 키값이 없습니다. application-secret.yml을 확인하세요.");
            }

            // V2 식별자 생성
            const paymentId = `payment-${crypto.randomUUID()}`;
            const planName = "PRO";
            const amount = 9900;

            addLog("📱 카카오페이 결제창을 호출합니다...");

            // 2. 포트원 V2 SDK 실행
            const response = await PortOne.requestPayment({
                storeId: storeId,
                channelKey: channelKey,
                paymentId: paymentId,
                orderName: `33Chat ${planName} 구독`,
                totalAmount: amount,
                currency: "CURRENCY_KRW",
                payMethod: "EASY_PAY",
                easyPay: { provider: "KAKAOPAY" },
                customer: {
                    fullName: "홍길동",
                    email: "test@gmail.com"
                }
            });

            // 사용자가 결제창을 닫거나 에러가 난 경우
            if (response.code != null) {
                addLog(`❌ 결제 중단: ${response.message}`);
                payBtn.disabled = false;
                return;
            }

            addLog("💳 결제 승인 완료! 서버에서 위변조 검증을 진행합니다...");

            // 3. 백엔드 검증 API 호출
            const verifyRes = await api.post('/api/payments/verify', {
                paymentId: paymentId,
                planName: planName,
                amount: amount
            });

            addLog(`🎉 최종 완료: ${verifyRes.data.message}`);
            alert("축하합니다! PRO 플랜으로 업그레이드되었습니다.");

        } catch (error) {
            console.error(error);
            addLog(`❌ 오류 발생: ${error.response?.data?.message || error.message}`);
        } finally {
            payBtn.disabled = false;
        }
    }
</script>

</body>
</html>
